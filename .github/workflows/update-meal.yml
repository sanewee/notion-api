name: update meal

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node generate-meal.js
        env:
          NEIS_KEY: ${{ secrets.NEIS_KEY }}

      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add meal.json
          git commit -m "update meal" || exit 0
          git push
